<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EngForce — Aprimoramento de Projetos Mecânicos</title>

    <link rel="stylesheet" href="css/style.css" />

    <!-- ESTILO EXTRA APENAS PARA ANIMAÇÃO -->
    <style>
      .gear-container {
        position: relative;
        width: 360px;
        height: 360px;
      }

      .gear {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: center;
        transform: translate(-50%, -50%);
        animation: rotate 12s linear infinite;
      }

      .gear-small {
        width: 120px;
        transform: translate(-50%, -50%) rotate(0deg);
        animation-direction: reverse;
        top: 65%;
        left: 65%;
      }

      .gear-main {
        width: 260px;
      }

      @keyframes rotate {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      .gear.locked {
        animation: none;
      }

      /* SOLDADO */
      .soldier {
        position: absolute;
        top: -300px;
        left: 50%;
        width: 140px;
        transform: translateX(-50%);
        opacity: 0;
        transition: all 1s ease;
        z-index: 5;
      }

      .soldier.enter {
        top: -40px;
        opacity: 1;
      }

      /* FAÍSCAS */
      .sparks {
        position: absolute;
        top: 52%;
        left: 52%;
        width: 40px;
        height: 40px;
        background: radial-gradient(circle, #ffc400 0%, transparent 70%);
        opacity: 0;
        pointer-events: none;
        z-index: 6;
      }

      .sparks.active {
        animation: spark 0.4s ease-out infinite;
        opacity: 1;
      }

      @keyframes spark {
        0% {
          transform: scale(0.6);
          opacity: 1;
        }
        100% {
          transform: scale(1.4);
          opacity: 0;
        }
      }

      /* LOGO FINAL */
      .logo-final {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 220px;
        opacity: 0;
        transform: scale(0.85);
        transition: all 1s ease;
        z-index: 4;
      }

      .logo-final.show {
        opacity: 1;
        transform: scale(1);
      }
    </style>
  </head>

  <body>
    <section id="inicio" class="hero">
      <div class="hero-content">
        <!-- SEU TEXTO ORIGINAL PERMANECE -->
      </div>

      <div class="hero-visual">
        <div class="gear-container">
          <!-- ENGRENAGEM PRINCIPAL -->
          <svg class="gear gear-main" viewBox="0 0 200 200">
            <g fill="none" stroke="rgba(0,94,184,0.6)" stroke-width="2">
              <circle cx="100" cy="100" r="60" />
              <circle cx="100" cy="100" r="40" />
              <circle cx="100" cy="100" r="8" />
            </g>
          </svg>

          <!-- ENGRENAGEM MENOR -->
          <svg class="gear gear-small" viewBox="0 0 100 100">
            <g fill="none" stroke="rgba(0,94,184,0.4)" stroke-width="2">
              <circle cx="50" cy="50" r="28" />
              <circle cx="50" cy="50" r="14" />
            </g>
          </svg>

          <!-- SOLDADO SIMBÓLICO -->
          <svg class="soldier" viewBox="0 0 200 300">
            <g fill="none" stroke="#0a58ca" stroke-width="5">
              <circle cx="100" cy="50" r="25" />
              <line x1="100" y1="75" x2="100" y2="150" />
              <line x1="100" y1="100" x2="40" y2="140" />
              <line x1="40" y1="140" x2="20" y2="120" />
            </g>
          </svg>

          <!-- FAISCAS -->
          <div class="sparks"></div>

          <!-- LOGO FINAL -->
          <img
            src="images/logo-engforce.png"
            class="logo-final"
            alt="EngForce"
          />
        </div>
      </div>
    </section>

    <script>
      window.addEventListener("load", () => {
        const soldier = document.querySelector(".soldier");
        const gears = document.querySelectorAll(".gear");
        const sparks = document.querySelector(".sparks");
        const logo = document.querySelector(".logo-final");

        setTimeout(() => {
          soldier.classList.add("enter");
        }, 1200);

        setTimeout(() => {
          gears.forEach((g) => g.classList.add("locked"));
          sparks.classList.add("active");
        }, 2600);

        setTimeout(() => {
          sparks.classList.remove("active");
        }, 3300);

        setTimeout(() => {
          logo.classList.add("show");
        }, 4200);
      });
    </script>
  </body>
</html>
